seed: 0
exp_name: exp001_train
exp_dir: "name_your_own"

train:
    # "co3d" or "simulator"
    dataset_type: "simulator"

    # Simulator dataset path (used when dataset_type=simulator)
    # Should point to the folder containing sequence subfolders with gt_cameras.npz
    SIMULATOR_DIR: "pose_diffusion/samples"

    # Co3D paths (used when dataset_type=co3d)
    CO3D_DIR: "/datasets01/co3dv2/080422/"
    CO3D_ANNOTATION_DIR: "/fsx-repligen/jianyuan/datasets/co3d_relpose/"


    img_size: 224
    category: seen
    restart_num: 10
    lr: 0.0001
    resume_ckpt: False
    epochs: 50
    ckpt_interval: 5
    num_workers: 4

    eval_interval: 5

    print_interval: 10

    len_train: 500        # 原来 16384，对小数据集没意义
    len_eval: 50          # 原来 256

    max_images: 32        # 原来 512，直接影响显存和速度
    normalize_cameras: True
    persistent_workers: True

    pin_memory: False
    clip_grad: 1.0
    preload_image: False
    cudnnbenchmark: True  # 开启可以加速
    first_camera_transform: True
    min_num_images: 10
    images_per_seq: [3, 10]  # 原来 [3, 51]，我们序列只有几十帧
    compute_optical: True
    color_aug: True
    erase_aug: False
    batch_repeat: 5       # 原来 90，这个最影响速度和显存

debug: False


MODEL:
    _target_: models.PoseDiffusionModel

    pose_encoding_type: absT_quaR_logFL

    IMAGE_FEATURE_EXTRACTOR: 
        _target_: models.MultiScaleImageFeatureExtractor
        modelname: "dino_vits16"
        freeze: False

    DENOISER: 
        _target_: models.Denoiser
        TRANSFORMER:
            _target_:               models.TransformerEncoderWrapper
            d_model:                512
            nhead:                  4
            dim_feedforward:        1024
            num_encoder_layers:     8
            dropout:                0.1
            batch_first:            True
            norm_first:             True

    DIFFUSER:
        _target_: models.GaussianDiffusion
        beta_schedule: custom
