seed: 0
exp_name: non_rigid_0_train
exp_dir: "non_rigid_0_train"

train:
    # "co3d" or "simulator"
    dataset_type: "simulator"

    # Simulator dataset path (used when dataset_type=simulator)
    # Should point to the folder containing sequence subfolders with gt_cameras.npz
    SIMULATOR_DIR: "pose_diffusion/samples"

    # Which sequences to use for training. null = use all sequences in SIMULATOR_DIR.
    # Example: seq_names: ["rigid_0"]  or  seq_names: ["rigid_0", "non_rigid_0"]
    seq_names: ["non_rigid_0"]

    # Co3D paths (used when dataset_type=co3d)
    CO3D_DIR: "/datasets01/co3dv2/080422/"
    CO3D_ANNOTATION_DIR: "/fsx-repligen/jianyuan/datasets/co3d_relpose/"


    img_size: 224
    category: seen
    restart_num: 10
    lr: 0.0001
    resume_ckpt: False
    resume_dir: "outputs/2026-03-27/00-27-35/name_your_own/ckpt_000049"
    start_epoch: 49
    epochs: 249
    ckpt_interval: 5
    num_workers: 8        # A6000服务器 CPU核多，加到8

    eval_interval: 5

    print_interval: 10

    len_train: 500
    len_eval: 50

    max_images: 64        # A6000 48GB显存，从20提到64
    normalize_cameras: True
    persistent_workers: True

    pin_memory: True      # Linux服务器开True，CPU→GPU传输更快
    clip_grad: 1.0
    preload_image: True   # 50张图全进RAM，之后读取零开销
    cudnnbenchmark: True
    first_camera_transform: True
    min_num_images: 10
    images_per_seq: [5, 20]
    compute_optical: True
    color_aug: True
    erase_aug: False
    batch_repeat: 20      # 显存大了，从5提到20，更充分利用GPU

debug: False


MODEL:
    _target_: models.PoseDiffusionModel

    pose_encoding_type: absT_quaR_logFL

    IMAGE_FEATURE_EXTRACTOR: 
        _target_: models.MultiScaleImageFeatureExtractor
        modelname: "dino_vits16"
        freeze: False

    DENOISER: 
        _target_: models.Denoiser
        TRANSFORMER:
            _target_:               models.TransformerEncoderWrapper
            d_model:                512
            nhead:                  4
            dim_feedforward:        1024
            num_encoder_layers:     8
            dropout:                0.1
            batch_first:            True
            norm_first:             True

    DIFFUSER:
        _target_: models.GaussianDiffusion
        beta_schedule: custom
